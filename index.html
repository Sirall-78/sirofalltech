<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sir Of All Tec</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#030712;
color:white;
overflow:hidden;
transition:0.4s;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:38px;
}

.hero h2{
font-size:30px;
margin-top:10px;
}

.mainLogo{
width:180px;
margin-top:20px;
filter:drop-shadow(0 0 15px #00c8ff);
animation:glow 3s infinite alternate;
}

@keyframes glow{

0%{
filter:drop-shadow(0 0 10px #00c8ff);
transform:scale(1);
}

50%{
filter:drop-shadow(0 0 40px #00ffff);
transform:scale(1.05);
}

100%{
filter:drop-shadow(0 0 10px #00c8ff);
transform:scale(1);
}

}

.coming{
margin-top:15px;
font-size:20px;
}

/* MENU BOTON */

.menuBtn{
position:fixed;
right:25px;
top:25px;
cursor:pointer;
z-index:5;
}

.menuBtn div{
width:30px;
height:3px;
background:#00c8ff;
margin:6px 0;
transition:0.3s;
}

.menuBtn.active div:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menuBtn.active div:nth-child(2){
opacity:0;
}

.menuBtn.active div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

/* MENU */

.menu{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding-top:100px;
transition:0.4s;
z-index:4;
}

.menu a{
display:block;
padding:20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.menu a:hover{
background:#00c8ff;
color:black;
}

.menu.active{
right:0;
}

/* POPUP */

.popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:320px;
max-width:80%;

background:#020617;
border:1px solid #00c8ff;
border-radius:10px;

padding:20px;

display:none;

z-index:6;

cursor:move;

}

.popup.show{
display:block;
}

/* MODO ROJO */

.redMode{
background:#0b0000;
}

.redMode .menuBtn div{
background:#ff4040;
}

/* MODO SISTEMA MORADO */

.systemMode{
background:#060018;
}

.systemMode .menuBtn div{
background:#b300ff;
}

.systemMode .popup{
border:1px solid #b300ff;
}

/* CEO PANEL */

.ceoPanel{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.ceoBtn{
background:#0a0a2a;
border:1px solid #6a00ff;
padding:15px;
cursor:pointer;
text-align:center;
}

.ceoBtn:hover{
background:#6a00ff;
}

/* CANVAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* FOOTER */

footer{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
opacity:0.6;
}

</style>
</head>

<body>

<div class="menuBtn" onclick="toggleMenu()" id="menuBtn">
<div></div>
<div></div>
<div></div>
</div>

<div class="menu" id="menu">

<a onclick="future()">Inicio</a>
<a onclick="openSessionPopup()">Sesión</a>
<a onclick="future()">Tecnología</a>
<a onclick="future()">Proyectos</a>
<a onclick="future()">Contacto</a>
<a onclick="toggleMode()">Modo Sistema</a>

</div>

<div class="popup" id="popup">

<b>Estado del sistema</b>

<div id="typing"></div>

</div>

<canvas id="bg"></canvas>

<div class="hero">

<h1>Hola, bienvenido a</h1>
<h2>Sir Of All Tec</h2>

<img src="logo.png" class="mainLogo">

<div class="coming">
Próximamente
</div>

</div>

<footer>
© SIROFALLTECH
</footer>

<!-- POPUP LOGIN -->

<div class="popup" id="codePopup">
<b>Ingresar código</b>
<input type="text" id="accessCode" placeholder="Código..." style="width:100%;padding:10px;margin-top:10px;">
<button onclick="submitCode()" style="margin-top:10px;">Ingresar</button>
<div id="codeMessage"></div>
</div>

<!-- INTERFAZ USUARIO -->

<div class="popup" id="userInterface" style="width:500px">

<b id="uiTitle"></b>

<div id="uiContent"></div>

</div>

<script>

/* MENU */

function toggleMenu(){
menu.classList.toggle("active");
menuBtn.classList.toggle("active");
}

/* MENSAJE FUTURO */

function future(){

popup.classList.add("show")

let message="Esta función está en desarrollo y estará disponible próximamente."

typing.innerHTML=""

let i=0

let t=setInterval(()=>{

typing.innerHTML+=message[i]

i++

if(i>=message.length) clearInterval(t)

},30)

}

/* LOGIN */

function openSessionPopup(){
codePopup.classList.add("show")
}

/* CEO INTERFACE */

function openCEO(){

uiTitle.innerText="Panel CEO"

uiContent.innerHTML=`

<div class="ceoPanel">

<div class="ceoBtn" onclick="future()">AI System</div>

<div class="ceoBtn" onclick="future()">Cloud Control</div>

<div class="ceoBtn" onclick="future()">Project Manager</div>

<div class="ceoBtn" onclick="future()">Security Layer</div>

<div class="ceoBtn" onclick="future()">Developer Console</div>

<div class="ceoBtn" onclick="future()">Analytics</div>

</div>

`

userInterface.classList.add("show")

}

/* VALIDAR CODIGO */

function submitCode(){

let code=accessCode.value

if(code==="07811"){

let pass=prompt("Contraseña CEO")

if(pass==="lordall78"){

openCEO()

codePopup.classList.remove("show")

}

}else{

codeMessage.innerHTML="Código incorrecto"

}

}

/* MODOS */

let mode="blue"

function toggleMode(){

if(mode==="blue"){

mode="system"

document.body.classList.add("systemMode")

}else{

mode="blue"

document.body.classList.remove("systemMode")

}

}

/* FONDO */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let nodes=[]

for(let i=0;i<120;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.8,
vy:(Math.random()-0.5)*0.8

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

nodes.forEach(n=>{

if(mode==="system"){

n.x+=n.vx*2
n.y+=n.vy*2

}else{

n.x+=n.vx
n.y+=n.vy

}

if(n.x<0||n.x>canvas.width)n.vx*=-1
if(n.y<0||n.y>canvas.height)n.vy*=-1

ctx.beginPath()

ctx.arc(n.x,n.y,2,0,Math.PI*2)

ctx.fillStyle=mode==="system"?"#b300ff":"#00c8ff"

ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
