<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sir Of All Tec</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#030712;
color:white;
overflow:hidden;
transition:0.4s;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:38px;}
.hero h2{font-size:30px;margin-top:10px;}

.mainLogo{
width:180px;
margin-top:20px;
filter:drop-shadow(0 0 15px #00c8ff);
animation:glow 3s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}
50%{filter:drop-shadow(0 0 40px #00ffff);transform:scale(1.05);}
100%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}
}

.coming{margin-top:15px;font-size:20px;}

/* MENU BOTON */

.menuBtn{
position:fixed;
right:25px;
top:25px;
cursor:pointer;
z-index:5;
}

.menuBtn div{
width:30px;
height:3px;
background:#00c8ff;
margin:6px 0;
transition:0.3s;
}

.menuBtn.active div:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menuBtn.active div:nth-child(2){
opacity:0;
}

.menuBtn.active div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

/* MENU */

.menu{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding-top:100px;
transition:0.4s;
z-index:4;
}

.menu a{
display:block;
padding:20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.menu a:hover{
background:#00c8ff;
color:black;
}

.menu.active{
right:0;
}

/* POPUPS */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
max-width:80%;
background:#020617;
border:1px solid #00c8ff;
border-radius:10px;
padding:20px;
display:none;
z-index:6;
cursor:move;
}

.popup.show{
display:block;
}

.popupHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.closeBtn{
cursor:pointer;
color:#00c8ff;
font-size:18px;
}

/* MODO ROJO */

.redMode{
background:#0b0000;
}

.redMode .menuBtn div{
background:#ff4040;
}

.redMode .menu a:hover{
background:#ff3030;
color:white;
}

.redMode .popup{
border:1px solid #ff3030;
}

.redMode .mainLogo{
filter:drop-shadow(0 0 25px #ff3030);
}

/* CANVAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* FOOTER */

footer{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
opacity:0.6;
}

</style>
</head>

<body>

<div class="menuBtn" onclick="toggleMenu()" id="menuBtn">
<div></div>
<div></div>
<div></div>
</div>

<div class="menu" id="menu">
<a onclick="future()">Inicio</a>
<a onclick="openSessionPopup()">Sesión</a>
<a onclick="future()">Tecnología</a>
<a onclick="future()">Proyectos</a>
<a onclick="future()">Contacto</a>
<a onclick="toggleMode()">Modo Sistema</a>
</div>

<canvas id="bg"></canvas>

<div class="hero">

<h1>Hola, bienvenido a</h1>
<h2>Sir Of All Tec</h2>

<img src="logo.png" class="mainLogo">

<div class="coming">
Próximamente
</div>

</div>

<footer>
© SIROFALLTECH
</footer>

<script>

/* MENU */

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
document.getElementById("menuBtn").classList.toggle("active");
}

/* MENSAJE FUTURO */

function future(){
alert("Esta sección estará disponible próximamente.");
}

/* MODOS */

let mode="blue"
let systemMode=false

function toggleMode(){

if(mode==="blue"){

mode="red"
systemMode=true
document.body.classList.add("redMode")

}else{

mode="blue"
systemMode=false
document.body.classList.remove("redMode")

}

}

/* CANVAS TECNOLOGICO */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

function resize(){

canvas.width=window.innerWidth
canvas.height=window.innerHeight

createNodes()

}

window.addEventListener("resize",resize)

let nodes=[]

function createNodes(){

nodes=[]

let density=(canvas.width*canvas.height)/6000

for(let i=0;i<density;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6

})

}

}

resize()

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=0;i<nodes.length;i++){

let n=nodes[i]

n.x+=n.vx
n.y+=n.vy

if(n.x<0||n.x>canvas.width) n.vx*=-1
if(n.y<0||n.y>canvas.height) n.vy*=-1

ctx.beginPath()
ctx.arc(n.x,n.y,2,0,Math.PI*2)
ctx.fillStyle=mode==="red"?"#ff4040":"#00c8ff"
ctx.fill()

for(let j=i+1;j<nodes.length;j++){

let m=nodes[j]

let dx=n.x-m.x
let dy=n.y-m.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

ctx.beginPath()
ctx.moveTo(n.x,n.y)
ctx.lineTo(m.x,m.y)

ctx.strokeStyle=mode==="red"?
"rgba(255,60,60,0.25)":
"rgba(0,200,255,0.25)"

ctx.lineWidth=1
ctx.stroke()

}

}

}

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
