<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sir Of All Tec</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#030712;
color:white;
overflow:hidden;
transition:0.4s;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:38px;
}

.hero h2{
font-size:30px;
margin-top:10px;
}

.mainLogo{
width:180px;
margin-top:20px;
filter:drop-shadow(0 0 15px #00c8ff);
animation:glow 3s infinite alternate;
}

@keyframes glow{

0%{
filter:drop-shadow(0 0 10px #00c8ff);
transform:scale(1);
}

50%{
filter:drop-shadow(0 0 40px #00ffff);
transform:scale(1.05);
}

100%{
filter:drop-shadow(0 0 10px #00c8ff);
transform:scale(1);
}

}

.coming{
margin-top:15px;
font-size:20px;

/* MENU BOTON */

.menuBtn{
position:fixed;
right:25px;
top:25px;
cursor:pointer;
z-index:5;
}

.menuBtn div{
width:30px;
height:3px;
background:#00c8ff;
margin:6px 0;
transition:0.3s;
}

.menuBtn.active div:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menuBtn.active div:nth-child(2){
opacity:0;
}

.menuBtn.active div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);

/* MENU */

.menu{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding-top:100px;
transition:0.4s;

display:block;
padding:20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.menu a:hover{
background:#00c8ff;
color:black;
}

.menu.active{
right:0;
}

<body>

<div class="menuBtn" onclick="toggleMenu()" id="menuBtn">

Próximamente
</div>

© SIROFALLTECH

<script>

/* MENU */

function toggleMenu(){

document.getElementById("menu").classList.toggle("active");
document.getElementById("menuBtn").classList.toggle("active");

}

/* POPUP */

function future(){

let popup=document.getElementById("popup");
let text=document.getElementById("typing");

popup.classList.add("show");

let message="Esta sección se encuentra en desarrollo... Próximamente disponible.";

text.innerHTML="";
let i=0;

let typing=setInterval(()=>{

text.innerHTML+=message[i];
i++;

if(i>=message.length) clearInterval(typing);

},35);

}

function closePopup(){
document.getElementById("popup").classList.remove("show");
}

/* POPUP ARRASTRABLE */

let popup=document.getElementById("popup");

let offsetX=0;
let offsetY=0;
let isDown=false;

popup.addEventListener("mousedown",e=>{

isDown=true;

offsetX=e.clientX-popup.offsetLeft;
offsetY=e.clientY-popup.offsetTop;

});

document.addEventListener("mouseup",()=>{

isDown=false;

});

document.addEventListener("mousemove",e=>{

if(!isDown) return;

popup.style.left=(e.clientX-offsetX)+"px";
popup.style.top=(e.clientY-offsetY)+"px";

popup.style.transform="none";

});

/* MODO */

let mode="blue";

function toggleMode(){

if(mode==="blue"){

mode="red";
document.body.classList.add("redMode");

}else{

mode="blue";
document.body.classList.remove("redMode");

}

}

/* FONDO TECNOLOGICO */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

createNodes();

}

window.addEventListener("resize",resize);

let nodes=[];

function createNodes(){

nodes=[];

let density=(canvas.width*canvas.height)/4500;

for(let i=0;i<density;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5

});

}

}

resize();

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

nodes.forEach(n=>{

n.x+=n.vx;
n.y+=n.vy;

if(n.x<0||n.x>canvas.width) n.vx*=-1;
if(n.y<0||n.y>canvas.height) n.vy*=-1;

ctx.beginPath();
ctx.arc(n.x,n.y,2,0,Math.PI*2);
ctx.fillStyle=mode==="red" ? "#ff4040" : "#00c8ff";
ctx.fill();

nodes.forEach(n2=>{

let dx=n.x-n2.x;
let dy=n.y-n2.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<180){

let depth=1-(dist/180);

ctx.beginPath();
ctx.moveTo(n.x,n.y);
ctx.lineTo(n2.x,n2.y);

ctx.strokeStyle=mode==="red"
? "rgba(255,60,60,"+depth+")"
: "rgba(0,200,255,"+depth+")";

ctx.lineWidth=depth*2;

ctx.stroke();

}

});

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>

<script>

// Lista de palabras ofensivas simples (puedes ampliar)
const bannedWords = ["fuck","shit","bitch","ass","pendejo","idiota","mierda","culo","cabron"];

// Abrir popup al tocar "Sesión"
function openSessionPopup(){
  closePopup(); // cierra el popup anterior si está abierto
  document.getElementById("codePopup").classList.add("show");
  document.getElementById("accessCode").value="";
  document.getElementById("codeMessage").innerHTML="";
}

// Cerrar popup de código

  document.getElementById("codePopup").classList.remove("show");
}

// Cerrar popup de interfaz de usuario
function closeUserInterface(){
  document.getElementById("userInterface").classList.remove("show");
}

// Función para validar código
function submitCode(){
  let code = document.getElementById("accessCode").value.trim();
  let msg = document.getElementById("codeMessage");

  if(code==="67067"){
    // Código especial 67067
    openUserInterface("Belman","Belman Bienvenido a Sir Of All Tec.","Próximamente podrás tener acceso a más funciones de desarrollador, no olvides tu codigo en caso de querer modificarlo manda un correo a sirofalltec@gmail.com.");
    closeCodePopup();
  } else if(code==="52370"){
    // Código que pide nombre clave
    let userName = prompt("Ingresa tu nombre clave (máx 10 letras)").trim();
    if(!userName){
      msg.innerHTML = "Debes ingresar un nombre válido.";
      return;
    }
    if(userName.length>10){
      msg.innerHTML = "Nombre demasiado largo.";
      return;
    }
    // filtro simple
    let lowerName = userName.toLowerCase();
    for(let word of bannedWords){
      if(lowerName.includes(word)){
        msg.innerHTML = "Nombre no permitido.";
        return;
      }
    }
    openUserInterface(userName,`Bienvenid@ ${userName} a Sir Of All Tec.`,"Próximamente podrás acceder a nuevas funciones.");
    closeCodePopup();
  } else if(code==="07811"){
    // Opciones de CEO / empleado
    let choice = prompt("Elige modo: 'CEO' o 'Empleado'").trim().toLowerCase();
    if(choice==="empleado"){
      openUserInterface("Aldo","Bienvenido Aldo a Sir Of All Tec.","Próximamente podrás acceder a funciones de desarrollador y funcion de cambio de cuenta.");
      closeCodePopup();
    } else if(choice==="ceo"){
      let ceoPass = prompt("Ingresa contraseña de CEO:");
      if(ceoPass==="lordall78"){
        // Interfaz CEO avanzada
        openUserInterface("Aldo (CEO)","Bienvenido Aldo, CEO de Sir Of All Tec.","Interfaz de administrador: aquí podrás gestionar usuarios, proyectos y más.en futuras actualizacíones");
        closeCodePopup();
      } else {
        msg.innerHTML = "Contraseña incorrecta.";
      }
    } else {
      msg.innerHTML = "Opción inválida.";
    }
  } else {
    msg.innerHTML = "Código incorrecto.";
  }
}

/* RED TECNOLOGICA */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

let nodes=[];

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

nodes=[];

let density=(canvas.width*canvas.height)/3500;

for(let i=0;i<density;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6

});

}

}

resize();

window.addEventListener("resize",resize);

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

nodes.forEach(n=>{

n.x+=n.vx;
n.y+=n.vy;

if(n.x<0||n.x>canvas.width) n.vx*=-1;
if(n.y<0||n.y>canvas.height) n.vy*=-1;

ctx.beginPath();
ctx.arc(n.x,n.y,2,0,Math.PI*2);

if(visualMode==="purple"){

nodes.forEach(n2=>{

let dx=n.x-n2.x;
let dy=n.y-n2.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<200){

let depth=1-(dist/200);

ctx.beginPath();
ctx.moveTo(n.x,n.y);

if(visualMode==="purple"){

}else{

}

ctx.lineWidth=depth*2;

ctx.stroke();

}

});

});
