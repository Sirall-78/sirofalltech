<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sir Of All Tec</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#030712;
color:white;
overflow:hidden;
transition:0.4s;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:38px;}
.hero h2{font-size:30px;margin-top:10px;}

.mainLogo{
width:180px;
margin-top:20px;
filter:drop-shadow(0 0 15px #00c8ff);
animation:glow 3s infinite alternate;
}

@keyframes glow{

0%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}
50%{filter:drop-shadow(0 0 40px #00ffff);transform:scale(1.05);}
100%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}

}

.coming{margin-top:15px;font-size:20px;}

/* MENU */

.menuBtn{
position:fixed;
right:25px;
top:25px;
cursor:pointer;
z-index:5;
}

.menuBtn div{
width:30px;
height:3px;
background:#00c8ff;
margin:6px 0;
}

.menu{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding-top:100px;
transition:0.4s;
z-index:4;
}

.menu a{
display:block;
padding:20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.menu a:hover{
background:#00c8ff;
color:black;
}

.menu.active{right:0;}

/* POPUPS */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
max-width:80%;
background:#020617;
border:1px solid #00c8ff;
border-radius:10px;
padding:20px;
display:none;
z-index:6;
cursor:move;
}

.popup.show{display:block;}

.closeBtn{cursor:pointer;color:#00c8ff;}

/* MODO SISTEMA MORADO */

.systemMode{
background:#0a0014;
}

.systemMode .menuBtn div{
background:#b300ff;
}

.systemMode .popup{
border:1px solid #b300ff;
}

.systemMode .mainLogo{
filter:drop-shadow(0 0 30px #b300ff);
}

/* CEO PANEL */

.ceoPanel{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:600px;
max-width:90%;

background:#140020;

border:1px solid #b300ff;

border-radius:10px;

padding:20px;

display:none;

z-index:8;

}

.ceoPanel.show{display:block;}

.ceoGrid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;

}

.ceoBtn{

background:#1e0030;
border:1px solid #b300ff;
padding:15px;
cursor:pointer;

}

.ceoBtn:hover{

background:#b300ff;
color:black;

}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

footer{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
opacity:0.6;
}

</style>
</head>

<body>

<div class="menuBtn" onclick="toggleMenu()" id="menuBtn">
<div></div>
<div></div>
<div></div>
</div>

<div class="menu" id="menu">

<a onclick="future()">Inicio</a>
<a onclick="openSessionPopup()">Sesión</a>
<a onclick="future()">Tecnología</a>
<a onclick="future()">Proyectos</a>
<a onclick="future()">Contacto</a>
<a onclick="toggleSystemMode()">Modo Sistema</a>

</div>

<div class="popup" id="popup">

<b>Estado del sistema</b>
<div id="typing"></div>

</div>

<!-- CEO PANEL -->

<div class="ceoPanel" id="ceoPanel">

<h2>Panel Ejecutivo CEO</h2>

<div class="ceoGrid">

<div class="ceoBtn" onclick="future()">Administrar usuarios</div>
<div class="ceoBtn" onclick="future()">Centro de proyectos</div>
<div class="ceoBtn" onclick="future()">Sistema de IA</div>
<div class="ceoBtn" onclick="future()">Control servidores</div>
<div class="ceoBtn" onclick="future()">Seguridad avanzada</div>
<div class="ceoBtn" onclick="future()">Laboratorio tecnológico</div>

</div>

</div>

<canvas id="bg"></canvas>

<div class="hero">

<h1>Hola, bienvenido a</h1>
<h2>Sir Of All Tec</h2>

<img src="logo.png" class="mainLogo">

<div class="coming">
Próximamente
</div>

</div>

<footer>
© SIROFALLTECH
</footer>

<script>

/* MENU */

function toggleMenu(){

document.getElementById("menu").classList.toggle("active");

}

/* FUTURE MESSAGE */

function future(){

let popup=document.getElementById("popup");
let text=document.getElementById("typing");

popup.classList.add("show");

let message="Sistema en desarrollo. Esta función estará disponible próximamente.";

text.innerHTML="";
let i=0;

let typing=setInterval(()=>{

text.innerHTML+=message[i];
i++;

if(i>=message.length) clearInterval(typing);

},30);

}

/* MODO SISTEMA */

let system=false;

function toggleSystemMode(){

system=!system;

if(system){

document.body.classList.add("systemMode");

}else{

document.body.classList.remove("systemMode");

}

}

/* CEO ACCESS */

function openCEO(){

document.getElementById("ceoPanel").classList.add("show");

}

/* SESSION */

function openSessionPopup(){

let code=prompt("Ingrese código de acceso");

if(code==="07811"){

let pass=prompt("Contraseña CEO");

if(pass==="lordall78"){

openCEO();

}

}

}

/* FONDO */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

createNodes();

}

window.addEventListener("resize",resize);

let nodes=[];

function createNodes(){

nodes=[];

for(let i=0;i<120;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*(system?1:0.5),
vy:(Math.random()-0.5)*(system?1:0.5)

});

}

}

resize();

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

nodes.forEach(n=>{

n.x+=n.vx;
n.y+=n.vy;

if(n.x<0||n.x>canvas.width) n.vx*=-1;
if(n.y<0||n.y>canvas.height) n.vy*=-1;

ctx.beginPath();
ctx.arc(n.x,n.y,2,0,Math.PI*2);

ctx.fillStyle=system?"#b300ff":"#00c8ff";

ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
