<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sir Of All Tec</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
/* =========================
   ESTILOS PRINCIPALES
   ========================= */
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:#030712;
  color:white;
  overflow:hidden;
  transition:0.4s;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{font-size:38px;}
.hero h2{font-size:30px;margin-top:10px;}

.mainLogo{
  width:180px;
  margin-top:20px;
  filter:drop-shadow(0 0 15px #00c8ff);
  animation:glow 3s infinite alternate;
}

@keyframes glow{
  0%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}
  50%{filter:drop-shadow(0 0 40px #00ffff);transform:scale(1.05);}
  100%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}
}

.coming{margin-top:15px;font-size:20px;}

/* BOTÓN MENU */
.menuBtn{
  position:fixed;
  right:25px;
  top:25px;
  cursor:pointer;
  z-index:5;
}

.menuBtn div{
  width:30px;
  height:3px;
  background:#00c8ff;
  margin:6px 0;
  transition:0.3s;
}

.menuBtn.active div:nth-child(1){
  transform:rotate(45deg) translate(5px,5px);
}

.menuBtn.active div:nth-child(2){
  opacity:0;
}

.menuBtn.active div:nth-child(3){
  transform:rotate(-45deg) translate(6px,-6px);
}

/* MENU LATERAL */
.menu{
  position:fixed;
  right:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#020617;
  padding-top:100px;
  transition:0.4s;
  z-index:4;
}

.menu a{
  display:block;
  padding:20px;
  text-decoration:none;
  color:white;
  border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}

.menu a:hover{
  background:#00c8ff;
  color:black;
}

.menu.active{
  right:0;
}

/* POPUPS */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  max-width:80%;
  background:#020617;
  border:1px solid #00c8ff;
  border-radius:10px;
  padding:20px;
  display:none;
  z-index:6;
  cursor:move;
}

.popup.show{
  display:block;
}

.popupHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.closeBtn{
  cursor:pointer;
  color:#00c8ff;
  font-size:18px;
}

/* MODO ROJO */
.redMode{
  background:#0b0000;
}

.redMode .menuBtn div{
  background:#ff4040;
}

.redMode .menu a:hover{
  background:#ff3030;
  color:white;
}

.redMode .popup{
  border:1px solid #ff3030;
}

.redMode .mainLogo{
  filter:drop-shadow(0 0 25px #ff3030);
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* FOOTER */
footer{
  position:fixed;
  bottom:40px;
  width:100%;
  text-align:center;
  opacity:0.6;
}
</style>
</head>
<body>

<!-- BOTÓN MENU -->
<div class="menuBtn" id="menuBtn">
  <div></div><div></div><div></div>
</div>

<!-- MENU LATERAL -->
<div class="menu" id="menu">
  <a id="inicioBtn">Inicio</a>
  <a id="sesionBtn">Sesión</a>
  <a id="tecnologiaBtn">Tecnología</a>
  <a id="proyectosBtn">Proyectos</a>
  <a id="contactoBtn">Contacto</a>
  <a id="toggleModeBtn">Modo Sistema</a>
  <!-- BOTONES SOLO ACTIVOS DESPUES DE LOGIN -->
  <a id="rainbowBtn" style="pointer-events:none;opacity:0.5;">Arcoiris</a>
  <a id="rainbowMixBtn" style="pointer-events:none;opacity:0.5;">Arcoiris Mixto</a>
  <a id="collapseBtn" style="pointer-events:none;opacity:0.5;">Colapsar</a>
  <a id="restoreBtn" style="pointer-events:none;opacity:0.5;">Salvar</a>
</div>

<!-- POPUP GENERICO -->
<div class="popup" id="popup">
  <div class="popupHeader">
    <b>Estado del sistema</b>
    <div class="closeBtn" id="closePopupBtn">✕</div>
  </div>
  <div id="typing"></div>
</div>

<!-- CANVAS -->
<canvas id="bg"></canvas>

<!-- HERO -->
<div class="hero">
  <h1>Hola, bienvenido a</h1>
  <h2>Sir Of All Tec</h2>
  <img src="logo.png" class="mainLogo">
  <div class="coming">Próximamente</div>
</div>

<footer>© SIROFALLTECH</footer>

<!-- POPUP LOGIN -->
<div class="popup" id="codePopup">
  <div class="popupHeader">
    <b>Ingresar código de acceso</b>
    <div class="closeBtn" id="closeCodePopupBtn">✕</div>
  </div>
  <input type="text" id="accessCode" placeholder="Escribe tu código..." maxlength="10" style="width:100%;padding:10px;margin-top:10px;font-size:16px;">
  <button id="submitCodeBtn" style="margin-top:10px;padding:10px 20px;cursor:pointer;background:#00c8ff;color:black;border:none;font-weight:bold;">Ingresar</button>
  <div id="codeMessage" style="margin-top:15px;"></div>
</div>

<!-- INTERFAZ USUARIO -->
<div class="popup" id="userInterface" style="width:500px;max-width:90%;">
  <div class="popupHeader">
    <b id="uiTitle">Bienvenido</b>
    <div class="closeBtn" id="closeUIBtn">✕</div>
  </div>
  <div id="uiContent" style="margin-top:10px;font-size:16px;"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  // Variables
  let mode="blue";
  let systemMode=false;
  const bannedWords=["fuck","shit","bitch","ass","pendejo","idiota","mierda","culo","cabron"];
  const canvas=document.getElementById("bg");
  const ctx=canvas.getContext("2d");
  let nodes=[], rainbow=false, rainbowMixed=false, hue=0;
  let originalNodes=[];
  let mouseX=0, mouseY=0;
  let isCollapsed=false, isExploded=false;

  // MENU
  const menuBtn=document.getElementById("menuBtn");
  const menu=document.getElementById("menu");
  menuBtn.addEventListener("click", ()=>{ menu.classList.toggle("active"); menuBtn.classList.toggle("active"); });

  // POPUPS
  const popup=document.getElementById("popup");
  const popupTyping=document.getElementById("typing");
  const codePopup=document.getElementById("codePopup");
  const userInterface=document.getElementById("userInterface");
  const codeMessage=document.getElementById("codeMessage");

  function showFuture(){
    popup.classList.add("show");
    let message="Esta sección se encuentra en desarrollo... Próximamente disponible.";
    popupTyping.innerHTML="";
    let i=0;
    let typing=setInterval(()=>{
      popupTyping.innerHTML+=message[i];
      i++;
      if(i>=message.length) clearInterval(typing);
    },35);
  }

  function toggleMode(){
    if(mode==="blue"){ mode="red"; systemMode=true; document.body.classList.add("redMode"); }
    else{ mode="blue"; systemMode=false; document.body.classList.remove("redMode"); }
  }

  function openSessionPopup(){
    if(!systemMode){ showFuture(); return; }
    codePopup.classList.add("show");
    document.getElementById("accessCode").value="";
    codeMessage.innerHTML="";
  }

  function closePopup(){ popup.classList.remove("show"); }
  function closeCodePopup(){ codePopup.classList.remove("show"); }
  function closeUserInterface(){ userInterface.classList.remove("show"); }

  function openUserInterface(name,title,message){
    document.getElementById("uiTitle").innerText=title;
    document.getElementById("uiContent").innerHTML="";
    userInterface.classList.add("show");
    let i=0;
    let interval=setInterval(()=>{
      document.getElementById("uiContent").innerHTML+=message.charAt(i);
      i++;
      if(i>=message.length) clearInterval(interval);
    },35);
  }

  function submitCode(){
    let code=document.getElementById("accessCode").value.trim();
    codeMessage.innerHTML="";
    if(code==="67067"){ openUserInterface("Belman","Belman","Bienvenido a Sir Of All Tec. Próximamente más funciones disponibles."); }
    else if(code==="52370"){
      let userName=prompt("Ingresa tu nombre clave (máx 10 letras)");
      if(!userName){ codeMessage.innerHTML="Debes ingresar un nombre válido."; return; }
      userName=userName.trim();
      if(userName.length>10){ codeMessage.innerHTML="Nombre demasiado largo."; return; }
      let lowerName=userName.toLowerCase();
      for(let word of bannedWords){ if(lowerName.includes(word)){ codeMessage.innerHTML="Nombre no permitido."; return; } }
      openUserInterface(userName,`Bienvenid@ ${userName}`, "Próximamente podrás acceder a nuevas funciones limitadas.");
    } else if(code==="07811"){
      let choice=prompt("Elige modo: 'CEO' o 'Empleado'").trim().toLowerCase();
      if(choice==="empleado"){ openUserInterface("Aldo","Aldo","Bienvenido a funciones de desarrollador."); }
      else if(choice==="ceo"){
        let ceoPass=prompt("Ingresa contraseña de CEO:");
        if(ceoPass==="lordall78"){ openUserInterface("Aldo (CEO)","Aldo","Interfaz de administrador: gestionar usuarios, proyectos y más."); }
        else{ codeMessage.innerHTML="Contraseña incorrecta."; return; }
      } else{ codeMessage.innerHTML="Opción inválida."; return; }
    } else{ codeMessage.innerHTML="Código incorrecto."; return; }

    ["rainbowBtn","rainbowMixBtn","collapseBtn","restoreBtn"].forEach(id=>{
      let el=document.getElementById(id);
      el.style.pointerEvents="auto";
      el.style.opacity="1";
    });

    closeCodePopup();
  }

  // Asignar botones del menú
  document.getElementById("sesionBtn").addEventListener("click", openSessionPopup);
  document.getElementById("inicioBtn").addEventListener("click", showFuture);
  document.getElementById("tecnologiaBtn").addEventListener("click", showFuture);
  document.getElementById("proyectosBtn").addEventListener("click", showFuture);
  document.getElementById("contactoBtn").addEventListener("click", showFuture);
  document.getElementById("toggleModeBtn").addEventListener("click", toggleMode);
  document.getElementById("closePopupBtn").addEventListener("click", closePopup);
  document.getElementById("closeCodePopupBtn").addEventListener("click", closeCodePopup);
  document.getElementById("closeUIBtn").addEventListener("click", closeUserInterface);
  document.getElementById("submitCodeBtn").addEventListener("click", submitCode);

  // NODOS Y ANIMACIÓN
  window.addEventListener("mousemove", e=>{ mouseX=e.clientX; mouseY=e.clientY; });

  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; createNodes(); }
  window.addEventListener("resize",resize);

  function createNodes(){
    nodes=[];
    let density=(canvas.width*canvas.height)/4500 + 10;
    for(let i=0;i<density;i++){
      nodes.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5, colorHue:Math.random()*360 });
    }
    nodes.push({ x:canvas.width/2, y:canvas.height/2, vx:0, vy:0, core:true, colorHue:Math.random()*360 });
    originalNodes=nodes.map(n=>({...n}));
  }
  resize();

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hue+=0.5;

    nodes.forEach(n=>{
      n.x+=n.vx;
      n.y+=n.vy;
      if(n.x<0||n.x>canvas.width) n.vx*=-1;
      if(n.y<0||n.y>canvas.height) n.vy*=-1;

      let radius = n.core ? 4 : 2;
      let dxMouse = n.x-mouseX, dyMouse = n.y-mouseY;
      let distMouse = Math.sqrt(dxMouse*dxMouse + dyMouse*dyMouse);
      let cursorEffect = distMouse<150 ? (150-distMouse)/150 : 0;

      ctx.beginPath();
      ctx.arc(n.x,n.y,radius+cursorEffect*2,0,Math.PI*2);

      if(rainbow){ ctx.fillStyle=`hsl(${hue},100%,60%)`; }
      else if(rainbowMixed){ ctx.fillStyle=`hsl(${n.colorHue},100%,60%)`; n.colorHue+=0.5; }
      else{ ctx.fillStyle=mode==="red" ? "#ff4040" : "#00c8ff"; }
      ctx.fill();

      nodes.forEach(n2=>{
        if(n===n2) return;
        let dx=n.x-n2.x, dy=n.y-n2.y;
        let dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<180){
          let depth=1-(dist/180);
          ctx.beginPath();
          ctx.moveTo(n.x,n.y);
          ctx.lineTo(n2.x,n2.y);
          if(rainbow){ ctx.strokeStyle=`hsla(${hue},100%,60%,${depth})`; }
          else if(rainbowMixed){ ctx.strokeStyle=`hsla(${n.colorHue},100%,60%,${depth})`; }
          else{ ctx.strokeStyle=mode==="red" ? `rgba(255,60,60,${depth})` : `rgba(0,200,255,${depth})`; }
          ctx.lineWidth=depth*2;
          ctx.stroke();
        }
      });
    });

    requestAnimationFrame(animate);
  }

  animate();

});
</script>
</body>
</html>
