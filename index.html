<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sir Of All Tec</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#030712;
color:white;
overflow:hidden;
transition:0.4s;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:38px;}
.hero h2{font-size:30px;margin-top:10px;}

.mainLogo{
width:180px;
margin-top:20px;
filter:drop-shadow(0 0 15px #00c8ff);
animation:glow 3s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px #00c8ff);}
50%{filter:drop-shadow(0 0 40px #00ffff);}
100%{filter:drop-shadow(0 0 10px #00c8ff);}
}

.menuBtn{
position:fixed;
right:25px;
top:25px;
cursor:pointer;
z-index:5;
}

.menuBtn div{
width:30px;
height:3px;
background:#00c8ff;
margin:6px 0;
transition:0.3s;
}

.menuBtn.active div:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menuBtn.active div:nth-child(2){
opacity:0;
}

.menuBtn.active div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

.menu{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding-top:100px;
transition:0.4s;
z-index:4;
}

.menu a{
display:block;
padding:20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.menu a:hover{
background:#00c8ff;
color:black;
}

.menu.active{
right:0;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.redMode{
background:#0b0000;
}

.redMode .menuBtn div{
background:#ff4040;
}

</style>
</head>

<body>

<div class="menuBtn" onclick="toggleMenu()" id="menuBtn">
<div></div>
<div></div>
<div></div>
</div>

<div class="menu" id="menu">
<a onclick="future()">Inicio</a>
<a onclick="future()">Sesión</a>
<a onclick="future()">Tecnología</a>
<a onclick="future()">Proyectos</a>
<a onclick="future()">Contacto</a>
<a onclick="toggleMode()">Modo Sistema</a>
</div>

<canvas id="bg"></canvas>

<div class="hero">

<h1>Hola, bienvenido a</h1>
<h2>Sir Of All Tec</h2>

<img src="logo.png" class="mainLogo">

<div>Próximamente</div>

</div>

<script>

/* MENU */

function toggleMenu(){
menu.classList.toggle("active")
menuBtn.classList.toggle("active")
}

function future(){
alert("Sección en desarrollo")
}

/* MODOS */

let mode="blue"

function toggleMode(){

if(mode==="blue"){
mode="red"
document.body.classList.add("redMode")
}else{
mode="blue"
document.body.classList.remove("redMode")
}

}

/* ===== CANVAS HIPERDIMENSIONAL ===== */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

})

let nodes=[]
let total=70

for(let i=0;i<total;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

let color=mode==="red"?"#ff4040":"#00c8ff"

for(let n of nodes){

n.x+=n.vx
n.y+=n.vy

if(n.x<0||n.x>canvas.width) n.vx*=-1
if(n.y<0||n.y>canvas.height) n.vy*=-1

ctx.beginPath()
ctx.arc(n.x,n.y,2,0,Math.PI*2)
ctx.fillStyle=color
ctx.fill()

}

/* CONEXIONES Y FIGURAS */

for(let i=0;i<nodes.length;i++){

for(let j=i+1;j<nodes.length;j++){

let a=nodes[i]
let b=nodes[j]

let dx=a.x-b.x
let dy=a.y-b.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<160){

ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)

ctx.strokeStyle=mode==="red"
?"rgba(255,80,80,0.3)"
:"rgba(0,200,255,0.3)"

ctx.stroke()

/* CREAR TRIANGULOS ALEATORIOS */

if(Math.random()<0.02){

let k=Math.floor(Math.random()*nodes.length)
let c=nodes[k]

ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.lineTo(c.x,c.y)
ctx.closePath()

ctx.strokeStyle=mode==="red"
?"rgba(255,80,80,0.15)"
:"rgba(0,200,255,0.15)"

ctx.stroke()

}

}

}

}

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
