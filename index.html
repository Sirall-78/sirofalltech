<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sir Of All Tec</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#030712;
color:white;
overflow:hidden;
transition:0.4s;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:38px;}
.hero h2{font-size:30px;margin-top:10px;}

.mainLogo{
width:180px;
margin-top:20px;
filter:drop-shadow(0 0 15px #00c8ff);
animation:glow 3s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px #00c8ff);}
50%{filter:drop-shadow(0 0 40px #00ffff);}
100%{filter:drop-shadow(0 0 10px #00c8ff);}
}

.coming{margin-top:15px;font-size:20px;}

.menuBtn{
position:fixed;
right:25px;
top:25px;
cursor:pointer;
z-index:5;
}

.menuBtn div{
width:30px;
height:3px;
background:#00c8ff;
margin:6px 0;
transition:0.3s;
}

.menuBtn.active div:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menuBtn.active div:nth-child(2){
opacity:0;
}

.menuBtn.active div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

.menu{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding-top:100px;
transition:0.4s;
z-index:4;
}

.menu a{
display:block;
padding:20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.menu a:hover{
background:#00c8ff;
color:black;
}

.menu.active{
right:0;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
max-width:80%;
background:#020617;
border:1px solid #00c8ff;
border-radius:10px;
padding:20px;
display:none;
z-index:6;
}

.popup.show{
display:block;
}

.popupHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.closeBtn{
cursor:pointer;
color:#00c8ff;
font-size:18px;
}

.redMode{
background:#0b0000;
}

.redMode .menuBtn div{
background:#ff4040;
}

.redMode .menu a:hover{
background:#ff3030;
color:white;
}

.redMode .popup{
border:1px solid #ff3030;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

footer{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
opacity:0.6;
}

</style>
</head>

<body>

<div class="menuBtn" onclick="toggleMenu()" id="menuBtn">
<div></div>
<div></div>
<div></div>
</div>

<div class="menu" id="menu">
<a onclick="future()">Inicio</a>
<a onclick="openSessionPopup()">Sesión</a>
<a onclick="future()">Tecnología</a>
<a onclick="future()">Proyectos</a>
<a onclick="future()">Contacto</a>
<a onclick="toggleMode()">Modo Sistema</a>
</div>

<canvas id="bg"></canvas>

<div class="hero">

<h1>Hola, bienvenido a</h1>
<h2>Sir Of All Tec</h2>

<img src="logo.png" class="mainLogo">

<div class="coming">
Próximamente
</div>

</div>

<footer>
© SIROFALLTECH
</footer>

<div class="popup" id="codePopup">

<div class="popupHeader">
<b>Ingresar código</b>
<div class="closeBtn" onclick="closeCodePopup()">✕</div>
</div>

<input id="accessCode" placeholder="Código">

<button onclick="submitCode()">Ingresar</button>

<div id="codeMessage"></div>

</div>

<div class="popup" id="userInterface">

<div class="popupHeader">
<b id="uiTitle"></b>
<div class="closeBtn" onclick="closeUserInterface()">✕</div>
</div>

<div id="uiContent"></div>

</div>

<script>

/* MENU */

function toggleMenu(){
menu.classList.toggle("active")
menuBtn.classList.toggle("active")
}

/* FUTURO */

function future(){
alert("Sección en desarrollo")
}

/* MODOS */

let mode="blue"
let systemMode=false

function toggleMode(){

if(mode==="blue"){

mode="red"
systemMode=true
document.body.classList.add("redMode")

}else{

mode="blue"
systemMode=false
document.body.classList.remove("redMode")

}

}

/* SESION */

function openSessionPopup(){

if(!systemMode){
future()
return
}

codePopup.classList.add("show")

}

function closeCodePopup(){
codePopup.classList.remove("show")
}

function closeUserInterface(){
userInterface.classList.remove("show")
}

/* CODIGOS */

function submitCode(){

let code=accessCode.value.trim()

if(code==="67067"){

openUserInterface(
"Belman",
"Belman Bienvenido",
"Acceso concedido"
)

}

else if(code==="52370"){

let name=prompt("Ingresa tu nombre")

if(!name) return

openUserInterface(
name,
"Bienvenido "+name,
"Acceso limitado"
)

}

else if(code==="07811"){

let pass=prompt("Contraseña CEO")

if(pass==="lordall78"){

openUserInterface(
"Aldo CEO",
"Bienvenido CEO",
"Panel administrador"
)

}else{

codeMessage.innerHTML="Contraseña incorrecta"

}

}

else{

codeMessage.innerHTML="Código incorrecto"

}

}

/* INTERFAZ */

function openUserInterface(name,title,message){

uiTitle.innerText=title
uiContent.innerText=message

userInterface.classList.add("show")

closeCodePopup()

}

/* ===== FONDO JARVIS 3D ===== */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

window.addEventListener("resize",()=>{

canvas.width=innerWidth
canvas.height=innerHeight

})

let nodes=[]
let total=80
let angle=0

for(let i=0;i<total;i++){

nodes.push({

x:(Math.random()-0.5)*800,
y:(Math.random()-0.5)*800,
z:(Math.random()-0.5)*800,

vx:(Math.random()-0.5)*0.3,
vy:(Math.random()-0.5)*0.3,
vz:(Math.random()-0.5)*0.3

})

}

function project(n){

let scale=600/(600+n.z)

return{

x:n.x*scale+canvas.width/2,
y:n.y*scale+canvas.height/2,
scale:scale

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

angle+=0.002

let color=mode==="red"?"#ff4040":"#00c8ff"

for(let n of nodes){

n.x+=n.vx
n.y+=n.vy
n.z+=n.vz

let cos=Math.cos(angle)
let sin=Math.sin(angle)

let x=n.x*cos-n.z*sin
let z=n.x*sin+n.z*cos

n.x=x
n.z=z

}

for(let i=0;i<nodes.length;i++){

let p1=project(nodes[i])

ctx.beginPath()
ctx.arc(p1.x,p1.y,2*p1.scale,0,Math.PI*2)
ctx.fillStyle=color
ctx.fill()

for(let j=i+1;j<nodes.length;j++){

let p2=project(nodes[j])

let dx=p1.x-p2.x
let dy=p1.y-p2.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<130){

ctx.beginPath()
ctx.moveTo(p1.x,p1.y)
ctx.lineTo(p2.x,p2.y)

ctx.strokeStyle=mode==="red"
?"rgba(255,80,80,0.25)"
:"rgba(0,200,255,0.25)"

ctx.stroke()

}

}

}

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
