<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Sir Of All Tec</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#030712;
color:white;
overflow:hidden;
transition:0.4s;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:38px;}
.hero h2{font-size:30px;margin-top:10px;}

.mainLogo{
width:180px;
margin-top:20px;
filter:drop-shadow(0 0 15px #00c8ff);
animation:glow 3s infinite alternate;
}

@keyframes glow{

0%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}
50%{filter:drop-shadow(0 0 40px #00ffff);transform:scale(1.05);}
100%{filter:drop-shadow(0 0 10px #00c8ff);transform:scale(1);}

}

.coming{margin-top:15px;font-size:20px;}

/* MENU */

.menuBtn{
position:fixed;
right:25px;
top:25px;
cursor:pointer;
z-index:5;
}

.menuBtn div{
width:30px;
height:3px;
background:#00c8ff;
margin:6px 0;
transition:0.3s;
}

.menuBtn.active div:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menuBtn.active div:nth-child(2){
opacity:0;
}

.menuBtn.active div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

.menu{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding-top:100px;
transition:0.4s;
z-index:4;
}

.menu a{
display:block;
padding:20px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.menu a:hover{
background:#00c8ff;
color:black;
}

.menu.active{
right:0;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
max-width:85%;
background:#020617;
border:1px solid #00c8ff;
border-radius:10px;
padding:20px;
display:none;
z-index:6;
}

.popup.show{
display:block;
}

.popupHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.closeBtn{
cursor:pointer;
color:#00c8ff;
font-size:18px;
}

/* MODO ROJO */

.redMode{
background:#0b0000;
}

.redMode .menuBtn div{
background:#ff4040;
}

.redMode .menu a:hover{
background:#ff3030;
color:white;
}

.redMode .popup{
border:1px solid #ff3030;
}

.redMode .mainLogo{
filter:drop-shadow(0 0 25px #ff3030);
}

/* CANVAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* FOOTER */

footer{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
opacity:0.6;
}

</style>

</head>

<body>

<div class="menuBtn" id="menuBtn">
<div></div>
<div></div>
<div></div>
</div>

<div class="menu" id="menu">

<a onclick="future()">Inicio</a>
<a onclick="openSessionPopup()">Sesión</a>
<a onclick="future()">Tecnología</a>
<a onclick="future()">Proyectos</a>
<a onclick="future()">Contacto</a>
<a onclick="toggleMode()">Modo Sistema</a>

</div>

<!-- Popup mensajes -->

<div class="popup" id="popup">

<div class="popupHeader">
<b>Estado del sistema</b>
<div class="closeBtn" onclick="closePopup()">✕</div>
</div>

<div id="typing"></div>

</div>

<!-- Popup código -->

<div class="popup" id="codePopup">

<div class="popupHeader">
<b>Ingresar código</b>
<div class="closeBtn" onclick="closeCodePopup()">✕</div>
</div>

<input type="text" id="accessCode" placeholder="Código..." style="width:100%;padding:10px">

<button onclick="submitCode()" style="margin-top:10px;padding:10px;width:100%;cursor:pointer;background:#00c8ff;border:none;font-weight:bold;">
Ingresar
</button>

<div id="codeMessage" style="margin-top:10px;"></div>

</div>

<!-- Popup interfaz -->

<div class="popup" id="userInterface">

<div class="popupHeader">
<b id="uiTitle"></b>
<div class="closeBtn" onclick="closeUserInterface()">✕</div>
</div>

<div id="uiContent"></div>

</div>

<canvas id="bg"></canvas>

<div class="hero">

<h1>Hola, bienvenido a</h1>
<h2>Sir Of All Tec</h2>

<img src="logo.png" class="mainLogo">

<div class="coming">
Próximamente
</div>

</div>

<footer>
© SIROFALLTECH
</footer>

<script>

/* VARIABLES DOM */

const menu = document.getElementById("menu")
const menuBtn = document.getElementById("menuBtn")

const popup = document.getElementById("popup")
const typing = document.getElementById("typing")

const codePopup = document.getElementById("codePopup")
const accessCode = document.getElementById("accessCode")
const codeMessage = document.getElementById("codeMessage")

const userInterface = document.getElementById("userInterface")
const uiTitle = document.getElementById("uiTitle")
const uiContent = document.getElementById("uiContent")

/* VARIABLES SISTEMA */

let mode="blue"
let systemMode=false

const bannedWords=["fuck","shit","bitch","pendejo","idiota","mierda"]

/* MENU */

menuBtn.onclick=()=>{

menu.classList.toggle("active")
menuBtn.classList.toggle("active")

}

/* MENSAJE SISTEMA */

function systemMessage(msg){

popup.classList.add("show")

typing.innerHTML=""

let i=0

let typingEffect=setInterval(()=>{

typing.innerHTML+=msg[i]
i++

if(i>=msg.length)clearInterval(typingEffect)

},35)

}

function closePopup(){
popup.classList.remove("show")
}

/* SECCIONES FUTURAS */

function future(){
systemMessage("Esta sección estará disponible próximamente.")
}

/* MODO SISTEMA */

function toggleMode(){

if(mode==="blue"){

mode="red"
systemMode=true

document.body.classList.add("redMode")

systemMessage("Modo Sistema ACTIVADO")

}else{

mode="blue"
systemMode=false

document.body.classList.remove("redMode")

systemMessage("Modo Sistema DESACTIVADO")

}

}

/* SESION */

function openSessionPopup(){

if(!systemMode){

systemMessage("Acceso bloqueado. Activa el Modo Sistema.")
return

}

codePopup.classList.add("show")
accessCode.value=""
codeMessage.innerHTML=""

}

function closeCodePopup(){
codePopup.classList.remove("show")
}

function closeUserInterface(){
userInterface.classList.remove("show")
}

/* VALIDAR CODIGOS */

function submitCode(){

let code=accessCode.value.trim()

if(code==="67067"){

openUserInterface("Belman","Bienvenido Belman","Acceso concedido al sistema.")

closeCodePopup()

}

else if(code==="52370"){

let userName=prompt("Ingresa nombre clave (max 10 letras)")

if(!userName)return

userName=userName.trim()

if(userName.length>10){

codeMessage.innerHTML="Nombre demasiado largo"
return

}

let lower=userName.toLowerCase()

for(let word of bannedWords){

if(lower.includes(word)){

codeMessage.innerHTML="Nombre no permitido"
return

}

}

openUserInterface(userName,`Bienvenid@ ${userName}`,"Acceso limitado activado.")

closeCodePopup()

}

else if(code==="07811"){

let choice=prompt("Modo: CEO o Empleado")

if(!choice)return

choice=choice.toLowerCase()

if(choice==="empleado"){

openUserInterface("Aldo","Empleado","Acceso de desarrollador.")

closeCodePopup()

}

else if(choice==="ceo"){

let pass=prompt("Contraseña CEO")

if(pass==="lordall78"){

openUserInterface("Aldo (CEO)","Panel CEO","Acceso completo habilitado.")

closeCodePopup()

}else{

codeMessage.innerHTML="Contraseña incorrecta"

}

}

}

else{

codeMessage.innerHTML="Código incorrecto"

}

}

/* INTERFAZ */

function openUserInterface(name,title,message){

uiTitle.innerText=title

uiContent.innerHTML=""

userInterface.classList.add("show")

let i=0

let typing=setInterval(()=>{

uiContent.innerHTML+=message.charAt(i)

i++

if(i>=message.length)clearInterval(typing)

},30)

}

/* FONDO TECNOLOGICO */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

function resize(){

canvas.width=window.innerWidth
canvas.height=window.innerHeight

createNodes()

}

window.addEventListener("resize",resize)

let nodes=[]

function createNodes(){

nodes=[]

let density=(canvas.width*canvas.height)/4500

for(let i=0;i<density;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5

})

}

}

resize()

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

nodes.forEach(n=>{

n.x+=n.vx
n.y+=n.vy

if(n.x<0||n.x>canvas.width)n.vx*=-1
if(n.y<0||n.y>canvas.height)n.vy*=-1

ctx.beginPath()
ctx.arc(n.x,n.y,2,0,Math.PI*2)

ctx.fillStyle=mode==="red"?"#ff4040":"#00c8ff"

ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
